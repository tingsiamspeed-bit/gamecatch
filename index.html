<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับแมลงระบบ Motion (รองรับ iOS)</title>
    
    <!-- นำเข้า Mediapipe สำหรับตรวจจับมือ -->
    <script src="https://jsdelivr.net" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #1a1a24;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-top: 15px;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .info-panel {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* จอเกมหลักแบบ Responsive รองรับมือถือ */
        #game-container {
            position: relative;
            width: 95vw;
            max-width: 700px;
            height: 60vh;
            max-height: 450px;
            background: linear-gradient(to bottom, #1e3a1e, #0f1f0f);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 4px solid #22c55e;
        }

        /* ซ่อนวิดีโอตัวเต็ม แต่เล่นอยู่เบื้องหลัง */
        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }

        /* ตัวชี้ตำแหน่งมือ (สวิงจับแมลง) */
        #hand-cursor {
            position: absolute;
            width: 45px;
            height: 45px;
            background: rgba(239, 68, 68, 0.4);
            border: 3px solid #ef4444;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 15px #ef4444;
        }

        #hand-cursor.fist {
            background: rgba(59, 130, 246, 0.6);
            border-color: #3b82f6;
            box-shadow: 0 0 20px #3b82f6;
            width: 35px;
            height: 35px;
        }

        .bug {
            position: absolute;
            font-size: 35px;
            transform: translate(-50%, -50%);
            transition: all 0.2s linear;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 20px;
        }

        .overlay.hidden {
            display: none;
        }

        .btn {
            background: linear-gradient(45deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        #loading {
            font-size: 1.1rem;
            color: #fbbf24;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Bug Catcher Motion Game (iOS OK)</h1>
    
    <div class="info-panel">
        <div>คะแนน: <span id="score">0</span></div>
        <div>เวลา: <span id="time">30</span> ส.</div>
    </div>

    <div id="game-container">
        <div id="hand-cursor"></div>

        <!-- หน้าจอเริ่มเกม -->
        <div id="start-screen" class="overlay">
            <div id="loading">กรุณากดปุ่มด้านล่างเพื่ออนุญาตเข้าถึงกล้อง...</div>
            <button id="start-btn" class="btn" style="display:none;">เริ่มเปิดกล้องและเล่นเกม</button>
        </div>

        <!-- หน้าจอจบเกม -->
        <div id="game-over-screen" class="overlay hidden">
            <h2>จบเกมแล้ว! 🎉</h2>
            <p style="font-size: 1.4rem; margin-top: 10px;">จับแมลงได้ทั้งหมด: <span id="final-score">0</span> ตัว</p>
            <button id="restart-btn" class="btn">เล่นอีกครั้ง</button>
        </div>
    </div>

    <!-- บังคับเปิดกล้องตามมาตรฐาน iOS (playsinline, autoplay, muted) -->
    <video id="webcam" autoplay playsinline muted></video>

    <script>
        const videoElement = document.getElementById('webcam');
        const gameContainer = document.getElementById('game-container');
        const handCursor = document.getElementById('hand-cursor');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const loadingText = document.getElementById('loading');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreDisplay = document.getElementById('final-score');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let bugInterval;
        let isPlaying = false;
        
        // ดึงขนาดหน้าจอเกมจริงแบบไดนามิก
        let containerWidth = gameContainer.clientWidth;
        let containerHeight = gameContainer.clientHeight;

        window.addEventListener('resize', () => {
            containerWidth = gameContainer.clientWidth;
            containerHeight = gameContainer.clientHeight;
        });

        const bugTypes = [
            { emoji: '🪲', type: 'bug', points: 1 },
            { emoji: '🪰', type: 'bug', points: 1 },
            { emoji: '🦋', type: 'bug', points: 2 },
            { emoji: '💣', type: 'bomb', points: -3 }
        ];

        // --- ตั้งค่าระบบตรวจจับนิ้วมือ (MediaPipe) ---
        const hands = new Hands({
            locateFile: (file) => `https://jsdelivr.net{file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onHandResults);

        // โครงสร้างกล้องแบบ Custom เพื่อให้รองรับ iOS Safari
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: 640, height: 480 },
                    audio: false
                });
                videoElement.srcObject = stream;
                
                return new Promise((resolve) => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        resolve(videoElement);
                    };
                });
            } catch (err) {
                loadingText.textContent = "ผิดพลาด: กรุณาอนุญาตให้ระบบเข้าถึงกล้องในตั้งค่าของ iOS";
                throw err;
            }
        }

        // ลูปประมวลผลเฟรมภาพต่อเฟรมภาพ (ยืดหยุ่นกว่าสำหรับอุปกรณ์พกพา)
        async function processVideo() {
            if (!videoElement.paused && !videoElement.ended) {
                await hands.send({ image: videoElement });
            }
            requestAnimationFrame(processVideo);
        }

        // แสดงปุ่มเริ่มทำงานหลังโหลดสคริปต์ AI เสร็จ
        loadingText.textContent = "ระบบพร้อมทำงานแล้ว กรุณากดปุ่มเพื่อเปิดกล้อง";
        startBtn.style.display = 'inline-block';

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const landmarks = results.multiHandLandmarks[0];
            const handPoint = landmarks[9]; // ใช้โคนนิ้วกลางเป็นจุดศูนย์กลางเล็ง
            
            // คำนวณพิกัดกระจกเงา (iOS มักจะกลับด้านภาพให้แล้ว หรือขยับตามทิศทาง)
            const x = (1 - handPoint.x) * containerWidth;
            const y = handPoint.y * containerHeight;

            handCursor.style.left = `${x}px`;
            handCursor.style.top = `${y}px`;

            // ตรวจการกำมือ (เปรียบเทียบความสูงปลายนิ้วกับข้อนิ้วโคน)
            const isFist = landmarks[8].y > landmarks[6].y && 
                           landmarks[12].y > landmarks[10].y && 
                           landmarks[16].y > landmarks[14].y;

            if (isFist) {
                handCursor.classList.add('fist');
                if (isPlaying) checkCollision(x, y);
            } else {
                handCursor.classList.remove('fist');
            }
        }

        // --- เริ่มต้นระบบเกม ---
        async function initGame() {
            startBtn.style.display = 'none';
            loadingText.textContent = "กำลังเริ่มระบบกล้อง...";
            
            try {
                await setupCamera();
                processVideo(); // เริ่มลูปประมวลผล AI
                startGame();
            } catch (e) {
                console.error(e);
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            isPlaying = true;

            startScreen.classList.add('hidden');
